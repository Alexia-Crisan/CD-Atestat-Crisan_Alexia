<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./login.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>

  <body>
    <div class="navwhole">
      <div class="navbar">
        <div class="navhalf">
          <div class="navtextleft">
            <p style="text-align: left; padding-left: 40px; font-size: 22px">
              <b>UniEssentials</b>
            </p>
          </div>
        </div>
        <div class="navhalf">
          <div class="navtextright">
            <a href="../home.html" style="font-size: 17px">Home</a>
            <a href="../about us.html" style="font-size: 17px">About us</a>
            <a href="../products.html" style="font-size: 17px">Our products</a>
            <a href="../contact.html" style="font-size: 17px">Contact us</a>
            <a href="../login.html" style="font-size: 17px"
              ><i class="fa-solid fa-user" style="font-size: 18px"></i
            ></a>
            <a href="../cart.html" style="font-size: 17px"
              ><i class="fa-solid fa-cart-shopping" style="font-size: 18px"></i
            ></a>
          </div>
        </div>
      </div>
    </div>

    <div class="page">
      <div class="loginspot">
        <h1 class="loginspot-title">Create account</h1>
        <p class="loginspot-sub">Join UniEssentials today</p>

        <div class="field">
          <label for="name">Full name</label>
          <div class="input-wrap">
            <input id="name" type="text" placeholder="John Doe" />
            <i class="fa-solid fa-user"></i>
          </div>
        </div>

        <div class="field">
          <label for="email">Email</label>
          <div class="input-wrap">
            <input id="email" type="email" placeholder="name@domain.com" />
            <i class="fa-solid fa-envelope"></i>
          </div>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="input-wrap">
            <input id="password" type="password" placeholder="••••••••" />
            <i class="fa-solid fa-lock"></i>
          </div>
        </div>

        <div class="field" style="margin-bottom: 28px">
          <label for="confirm">Confirm password</label>
          <div class="input-wrap">
            <input id="confirm" type="password" placeholder="••••••••" />
            <i class="fa-solid fa-lock"></i>
          </div>
        </div>

        <button class="btn-primary">Sign up</button>

        <p class="signup-row">
          Already have an account? <a href="./login.html">Log in</a>
        </p>
      </div>
    </div>

    <div class="footerdiv">
      <div class="footerdivhalf" style="justify-content: flex-end">
        <p style="font-size: 20px; text-align: right">
          <a href="mailto:uniessentials@gmail.com" style="font-size: 20px"
            >uniessentials@gmail.com</a
          >
        </p>
      </div>
      <div
        class="footerdivhalf"
        style="
          padding-right: 20px;
          flex-direction: row;
          justify-content: flex-start;
        "
      >
        <a
          href="https://www.facebook.com/profile.php?id=61566470451000&locale=ro_RO"
          class="fa-brands fa-facebook"
        ></a>
        <a
          href="https://www.instagram.com/uniessentials/"
          class="fa-brands fa-instagram"
        ></a>
        <a href="https://pin.it/5JiIFfCrw" class="fa-brands fa-pinterest"></a>
        <a
          href="https://www.youtube.com/@Uniessentials"
          class="fa-brands fa-youtube"
        ></a>
      </div>
    </div>
  </body>
</html>
