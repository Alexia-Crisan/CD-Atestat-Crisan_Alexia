<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./login.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="navwhole">
      <div class="navbar">
        <div class="navhalf">
          <div class="navtextleft">
            <p style="text-align: left; padding-left: 40px; font-size: 22px">
              <b>UniEssentials</b>
            </p>
          </div>
        </div>
        <div class="navhalf">
          <div class="navtextright">
            <a href="../home.html" style="font-size: 17px">Home</a>
            <a href="../about us.html" style="font-size: 17px">About us</a>
            <a href="../products.html" style="font-size: 17px">Our products</a>
            <a href="../contact.html" style="font-size: 17px">Contact us</a>
            <a href="../login.html" style="font-size: 17px"
              ><i class="fa-solid fa-user" style="font-size: 18px"></i
            ></a>
            <a href="../cart.html" style="font-size: 17px"
              ><i class="fa-solid fa-cart-shopping" style="font-size: 18px"></i
            ></a>
          </div>
        </div>
      </div>
    </div>

    <div class="page">
      <div
        id="already-logged-in"
        class="loginspot"
        style="display: none; text-align: center"
      >
        <i
          class="fa-solid fa-circle-check"
          style="
            font-size: 48px;
            color: rgb(154, 203, 208);
            margin-bottom: 16px;
          "
        ></i>
        <h1 class="loginspot-title">You're logged in</h1>
        <p class="loginspot-sub" style="margin-bottom: 32px">
          Welcome back, <span id="logged-in-name"></span>!
        </p>
        <a
          href="../home.html"
          class="btn-primary"
          style="
            display: block;
            text-decoration: none;
            margin-bottom: 12px;
            color: rgb(100, 160, 175);
          "
          >Go to Home</a
        >
        <button
          class="btn-primary"
          id="logout-btn"
          style="
            background-color: transparent;
            border: 2px solid rgb(242, 239, 231);
            color: rgb(242, 239, 231);
          "
        >
          Log out
        </button>
      </div>

      <div id="login-form" class="loginspot">
        <h1 class="loginspot-title">Welcome back</h1>
        <p class="loginspot-sub">Log in to your UniEssentials account</p>

        <div class="field">
          <label for="email">Email</label>
          <div class="input-wrap">
            <input id="email" type="email" placeholder="name@domain.com" />
            <i class="fa-solid fa-envelope"></i>
          </div>
        </div>

        <div class="field" style="margin-bottom: 28px">
          <label for="password">Password</label>
          <div class="input-wrap">
            <input id="password" type="password" placeholder="••••••••" />
            <i class="fa-solid fa-lock"></i>
          </div>
        </div>

        <p
          id="error-msg"
          style="
            color: rgb(250, 77, 77);
            font-size: 13px;
            margin-bottom: 12px;
            display: none;
          "
        ></p>

        <button class="btn-primary" id="login-btn">Log in</button>

        <p class="signup-row">
          Don't have an account? <a href="./signup.html">Sign up</a>
        </p>
      </div>
    </div>

    <div class="footerdiv">
      <div class="footerdivhalf" style="justify-content: flex-end">
        <p style="font-size: 20px; text-align: right">
          <a href="mailto:uniessentials@gmail.com" style="font-size: 20px"
            >uniessentials@gmail.com</a
          >
        </p>
      </div>
      <div
        class="footerdivhalf"
        style="
          padding-right: 20px;
          flex-direction: row;
          justify-content: flex-start;
        "
      >
        <a
          href="https://www.facebook.com/profile.php?id=61566470451000&locale=ro_RO"
          class="fa-brands fa-facebook"
        ></a>
        <a
          href="https://www.instagram.com/uniessentials/"
          class="fa-brands fa-instagram"
        ></a>
        <a href="https://pin.it/5JiIFfCrw" class="fa-brands fa-pinterest"></a>
        <a
          href="https://www.youtube.com/@Uniessentials"
          class="fa-brands fa-youtube"
        ></a>
      </div>
    </div>

    <script type="module" src="./JS/login.js"></script>
    <script type="module" src="./JS/navbar.js"></script>
  </body>
</html>
